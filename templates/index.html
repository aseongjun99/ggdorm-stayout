<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FastAPI 로그인 테스트</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-radius; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #007bff; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>기숙사 로그인 테스트 페이지</h2>
    <form action="/login-test" method="post">
        <div class="form-group">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" name="loginId" value="id1234" required>
        </div>
        <div class="form-group">
            <label for="loginPwd">비밀번호</label>
            <input type="password" id="loginPwd" name="loginPwd" value="pwd1234@" required>
        </div>
        <button type="submit">호출하기(POST)</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>실행 결과</h3>
        <div>{{ result | safe }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
